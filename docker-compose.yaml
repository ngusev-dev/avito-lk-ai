version: "3.8"

services:
  frontend:
    container_name: avito-lk-ai-frontend
    build:
      context: ./avito-lk-ai
      dockerfile: Dockerfile
      args:
        VITE_AI_BASE_URL: http://127.0.0.1:11434
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "4173:4173"
    restart: always
    depends_on:
      - api

  api:
    container_name: avito-lk-ai-api
    build: ./server
    environment:
      - HOST=0.0.0.0
    ports:
      - "8080:8080"
    restart: always
